methodology: Subjects sat in front of screen at ~50 cm distance without instrumental noise-reduction devices. EEG cap and
  Samsung Gear were placed on subject. Smartphones were continuously swapped between switched-on and switched-off conditions.
  Each block consisted of 1 minute of EEG recording with eyes opened. The sequence of 10 blocks was randomized prior to experiment
  using random number generator with no autocorrelation. Triggers marked beginning of each block (1=switched-off, 2=switched-on).
